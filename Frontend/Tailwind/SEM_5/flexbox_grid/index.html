<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>flexbox_grid</title>
</head>

<body class="bg-gray-100">
  <div class="grid grid-cols-[220px_1fr] h-96 gap-4 p-10">
    <aside class="bg-slate-200 rounded-xl p-4">Sidebar</aside>
    <main class="flex flex-col gap-4">
      <header class="flex justify-between items-center bg-white border border-slate-200 rounded-xl p-4">
        <span>Panel</span>
        <span class="text-sm text-slate-400">Abel V.</span>
      </header>
      <section class="flex-1 bg-white border border-slate-200 rounded-xl p-4">Contenido</section>
    </main>
  </div>

  <hr>

  <div class="@container mx-auto max-w-5xl p-6">
    <div class="rounded-xl border border-slate-200 bg-white p-6 flex flex-col gap-4 @md:flex-row">
      <div class="h-32 rounded-lg bg-slate-200 @md:w-40"></div>
      <div class="flex flex-col">
        <h2 class="text-lg font-semibold">MacBook Air M1</h2>
        <p class="mt-2 text-slate-600">Laptop ultradelgada y con gran autonomía.</p>
        <button class="mt-4 self-start rounded-lg bg-slate-900 px-4 py-2 text-white">Comprar</button>
      </div>
    </div>
  </div>


  <div class="grid grid-cols-3 gap-4 p-4">
    <div class="col-span-2 h-40 bg-white border border-slate-200 rounded-xl p-4 flex flex-col">
      <h2 class="text-lg font-semibold">MacBook Air M1</h2>
      <div class="flex-1"></div>
      <div class="flex items-center justify-between">
        <span class="text-2xl font-bold">$1,299</span>
        <button class="rounded-lg bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Comprar</button>
      </div>
    </div>
    <div class="h-40 bg-white border border-slate-200 rounded-xl p-4 flex flex-col">
      <h2 class="text-lg font-semibold">iPhone 17 Pro Max</h2>
      <div class="flex-1"></div>
      <div class="flex items-center justify-between">
        <span class="text-2xl font-bold">$1,299</span>
        <button class="rounded-lg bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Comprar</button>
      </div>
    </div>
    <div class="h-40 bg-white border border-slate-200 rounded-xl"></div>
    <div class="h-40 bg-white border border-slate-200 rounded-xl"></div>
    <div class="h-40 bg-white border border-slate-200 rounded-xl"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 p-4 gap-4">
    <div class="h-40 bg-white border border-slate-200 rounded-xl"></div>
    <div class="h-40 bg-white border border-slate-200 rounded-xl"></div>
    <div class="h-40 bg-white border border-slate-200 rounded-xl"></div>
  </div>



  <script type="module" src="/src/main.js"></script>
</body>

</html>
